description = "AI job search command center -- show menu or evaluate job description"

prompt = """
Career-ops router. Arguments provided: "{{args}}"

If arguments contain a job description or URL (keywords like "responsibilities", "requirements", "qualifications", "about the role", "http", "https"), execute auto-pipeline mode.

Otherwise, show the discovery menu:

```
career-ops -- Command Center

Available commands:
  /career-ops {JD}           → AUTO-PIPELINE: evaluate + report + PDF + tracker (paste text or URL)
  /career-ops:pipeline       → Process pending URLs from inbox (data/pipeline.md)
  /career-ops:evaluate       → Evaluation only A-F (no auto PDF)
  /career-ops:compare        → Compare and rank multiple offers
  /career-ops:contact        → LinkedIn power move: find contacts + draft message
  /career-ops:deep           → Deep research prompt about company
  /career-ops:pdf            → PDF only, ATS-optimized CV
  /career-ops:training       → Evaluate course/cert against North Star
  /career-ops:project        → Evaluate portfolio project idea
  /career-ops:tracker        → Application status overview
  /career-ops:apply          → Live application assistant (reads form + generates answers)
  /career-ops:scan           → Scan portals and discover new offers
  /career-ops:batch          → Batch processing with parallel workers
  /career-ops:patterns       → Analyze rejection patterns and improve targeting

Inbox: add URLs to data/pipeline.md → /career-ops:pipeline
Or paste a JD directly to run the full pipeline.
```

## Context Loading

For auto-pipeline mode, read these files in order:
1. `modes/_shared.md` (system rules and scoring)
2. `modes/_profile.md` (user customizations, if exists)
3. `modes/auto-pipeline.md` (pipeline instructions)
4. `cv.md` (candidate CV)
5. `config/profile.yml` (candidate identity)
6. `article-digest.md` (proof points, if exists)

Then execute the auto-pipeline instructions from the loaded mode file.
"""
